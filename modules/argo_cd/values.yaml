server:
  service:
    type: LoadBalancer
    port: 443

applications:
  - name: example-app
    namespace: dev
    project: default
    source:
      repoURL: https://github.com/illarionovam/infra.git
      targetRevision: main
      path: charts/django-app
      helm:
        valueFiles:
          - values.yaml
    destination:
      server: https://kubernetes.default.svc
      namespace: dev
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

repositories:
  - name: example-app
    url: https://github.com/illarionovam/infra.git
    type: git
    username: illarionovam
    password:

repoConfig:
  insecure: "true"
