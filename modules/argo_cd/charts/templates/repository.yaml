{{- range .Values.repositories }}
apiVersion: v1
kind: Secret
metadata:
  name: repo-{{ .name }}
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: {{ .url }}
  username: {{ .username }}
  password: {{ .password }}
  insecure: {{ $.Values.repoConfig.insecure | default "false" | quote }}
  enableLfs: {{ $.Values.repoConfig.enableLfs | default "false" | quote }}
---
{{- end }}
